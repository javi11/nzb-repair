download_providers:
  - host: news.example.com
    port: 119
    username: user
    password: pass
    tls: true
    max_connections: 10
    max_connection_idle_time_in_seconds: 2400
    # max_connection_ttl_in_seconds: 0  # 0 = no TTL
    # is_backup_provider: false
    # insecure_ssl: false

upload_providers:
  - host: upload.example.com
    port: 119
    username: user
    password: pass
    tls: true
    max_connections: 5
    max_connection_idle_time_in_seconds: 2400

# Scan interval for the directory watcher in duration string like "40s" "5m", "1h"
scan_interval: 5m

# Maximum number of retries for a failed download
max_retries: 3

# Folder to move broken files to
broken_folder: broken
